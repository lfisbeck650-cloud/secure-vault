name: Flatpak Release
on:
  push:
    tags:
      - "v*"

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd apps/desktop
          npm ci
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust backend
        run: |
          cargo build --release --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.securevault.desktop.flatpak
          manifest-path: flatpak/com.securevault.desktop.json
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Create repo and flatpakref
        run: |
          flatpak build-export --no-update-summary repo build-dir
          flatpak build-update-repo --generate-static-deltas repo
          cat > com.securevault.desktop.flatpakref << EOF
          [Flatpak Ref]
          Title=Secure Vault
          Name=com.securevault.desktop
          Branch=master
          Url=https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/repo
          IsRuntime=false
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: |
            com.securevault.desktop.flatpak
            com.securevault.desktop.flatpakref
            repo/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            com.securevault.desktop.flatpak
            com.securevault.desktop.flatpakref
